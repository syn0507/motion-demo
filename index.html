<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔄 向きセンサーデモ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            color: #333; text-align: center; transition: background 0.5s ease;
        }
        body.right { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        body.left { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .container { max-width: 95vw; padding: 20px; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .header {
            font-size: 3.5em; font-weight: 900; margin: 20px 0;
            background: linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(102,126,234,0.6); transition: all 0.3s;
        }
        .content {
            font-size: 1.7em; line-height: 1.6; background: rgba(255,255,255,0.95);
            color: #333; padding: 35px; border-radius: 30px; backdrop-filter: blur(20px);
            max-height: 55vh; overflow-y: auto; margin: 25px 0; box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            transition: all 0.4s ease; transform: scale(0.95);
        }
        .content.show { transform: scale(1); }
        .instruction {
            font-size: 1.5em; margin: 25px 0; padding: 20px; background: rgba(255,255,255,0.8);
            border-radius: 25px; border: 3px solid rgba(255,255,255,0.5); font-weight: 600;
        }
        .debug {
            position: fixed; top: 15px; left: 15px; right: 15px; background: rgba(0,0,0,0.85);
            color: #00ff88; padding: 15px; border-radius: 20px; font-family: monospace; font-size: 1em;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn { 
            background: linear-gradient(45deg, #4facfe, #00f2fe); color: white; border: none; 
            padding: 20px 45px; font-size: 1.4em; border-radius: 50px; cursor: pointer; margin: 15px;
            box-shadow: 0 15px 35px rgba(79,172,254,0.4); transition: all 0.3s; font-weight: 600;
        }
        .btn:hover { transform: translateY(-8px) scale(1.08); box-shadow: 0 20px 45px rgba(79,172,254,0.6); }
        .status { font-size: 2em; padding: 15px; background: rgba(255,255,255,0.9); border-radius: 20px; margin: 10px 0; }
        @keyframes glow { 0%,100%{text-shadow:0 0 20px rgba(255,255,255,0.8);} 50%{text-shadow:0 0 40px rgba(255,255,255,1);} }
        .glow { animation: glow 1.5s infinite; }
    </style>
</head>
<body>
    <div class="debug" id="debug">🔄 右/左に端末を向けてください</div>
    
    <div class="container">
        <div id="permissionScreen">
            <div class="header glow">向きセンサーデモ</div>
            <div class="instruction">📱 <strong>右に→資料　左に→チェックリスト</strong></div>
            <button class="btn" onclick="requestPermission()">🎯 センサーON</button>
            <div class="status">準備完了！端末を右or左に傾けて</div>
        </div>

        <div id="mainScreen" style="display:none;">
            <div class="header" id="currentScreen">資料</div>
            <div class="instruction" id="instruction"></div>
            <div class="content" id="content"></div>
        </div>
    </div>

    <script>
        // === 向き検知専用設定 ===
        const TILT_RIGHT = 15;   // 右向きしきい値（度）
        const TILT_LEFT = -15;   // 左向きしきい値（度）
        
        let permissionGranted = false, currentScreen = '資料';
        
        // iPhone/Android両対応権限
        async function requestPermission() {
            try {
                if (DeviceOrientationEvent?.requestPermission) {
                    const res = await DeviceOrientationEvent.requestPermission();
                    permissionGranted = res === 'granted';
                } else {
                    permissionGranted = true; // Android自動許可
                }
            } catch(e) { permissionGranted = true; }
            
            if (permissionGranted) {
                document.getElementById('permissionScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                window.addEventListener('deviceorientation', handleOrientation);
                document.body.classList.add('glow');
                updateDebug('✅ 向き検知開始 | 右:' + TILT_RIGHT + '° 左:' + TILT_LEFT + '°');
            }
        }
        
        // === 向き判定（gamma=左右傾き） ===
        function handleOrientation(event) {
            const gamma = event.gamma || 0; // -90°〜90°（右向き+、左向き-）
            
            updateDebug(`γ:${gamma.toFixed(1)}° ${gamma > TILT_RIGHT ? '➡️右' : gamma < TILT_LEFT ? '⬅️左' : '中'}`);
            
            // 右向き検知
            if (gamma > TILT_RIGHT && currentScreen !== '資料') {
                switchScreen('資料');
                document.body.classList.add('right');
                document.body.classList.remove('left');
            }
            // 左向き検知
            else if (gamma < TILT_LEFT && currentScreen !== 'チェックリスト') {
                switchScreen('チェックリスト');
                document.body.classList.add('left');
                document.body.classList.remove('right');
            }
        }
        
        function switchScreen(screen) {
            currentScreen = screen;
            const data = screen === '資料' ? docData : checklistData;
            document.getElementById('currentScreen').textContent = data.title;
            document.getElementById('instruction').innerHTML = data.instruction;
            document.getElementById('content').innerHTML = data.content;
            document.querySelector('.content').classList.add('show');
        }
        
        // === コンテンツ（カスタマイズ可） ===
        const docData = {
            title: '📊 営業資料',
            instruction: '🔄 右向きで固定表示 ➡️',
            content: `
                <h2 style="font-size:2.2em;margin-bottom:25px;">2026年度 第1四半期実績</h2>
                <div style="text-align:left;font-size:1.3em;">
                    <div style="background:#e8f4f8;padding:20px;border-radius:15px;margin:15px 0;">
                        <strong>🎯 達成率 128%</strong><br>
                        当期売上：¥15.2億（前年比+32%）
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;">
                        <div style="background:#fff3cd;padding:15px;border-radius:12px;">
                            <strong>📈 新規獲得</strong><br>42社（目標120%）
                        </div>
                        <div style="background:#d1ecf1;padding:15px;border-radius:12px;">
                            <strong>💰 平均単価</strong><br>¥3,620万（+18%↑）
                        </div>
                    </div>
                    <div style="background:#f8d7da;padding:20px;border-radius:15px;">
                        <strong>🚀 次アクション</strong><br>
                        • AR提案デモ実施<br>
                        • スマートグラスPoC<br>
                        • 5月契約3社目標
                    </div>
                </div>
            `
        };
        
        const checklistData = {
            title: '✅ 契約チェックリスト',
            instruction: '🔄 左向きで固定表示 ⬅️',
            content: `
                <h2 style="font-size:2.2em;margin-bottom:25px;">契約手続きステータス</h2>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;">
                    <div style="background:#d4edda;padding:20px;border-radius:15px;">
                        <strong style="color:#155724;">✅ 完了</strong><br>
                        見積書発行<br>仕様確認
                    </div>
                    <div style="background:#fff3cd;padding:20px;border-radius:15px;">
                        <strong style="color:#856404;">⚠️ 進行中</strong><br>
                        部長承認<br>法務レビュー
                    </div>
                    <div style="background:#f8d7da;padding:20px;border-radius:15px;">
                        <strong style="color:#721c24;">⏳ 未</strong><br>
                        決裁印<br>支払条件
                    </div>
                </div>
                <div style="margin-top:30px;text-align:center;font-size:1.2em;">
                    <strong>⏰ 目標締切：4/28</strong><br>
                    <span style="color:#28a745;font-size:1.5em;">残り7日</span>
                </div>
            `
        };
    </script>
</body>
</html>
