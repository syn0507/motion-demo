<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📄 PDF向きセンサー（最終調整）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;background:linear-gradient(135deg,#ff9a9e 0%,#fecfef 50%,#fecfef 100%);color:white;text-align:center;transition:background 0.5s;}
        body.pdf{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);}
        body.list{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);}
        .container{max-width:95vw;padding:20px;height:100vh;display:flex;flex-direction:column;justify-content:center;}
        .header{font-size:3.2em;font-weight:900;margin:20px 0;background:linear-gradient(45deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(102,126,234,0.6);}
        .pdf-viewer{width:92%;height:380px;border-radius:25px;box-shadow:0 25px 70px rgba(0,0,0,0.4);border:4px solid rgba(255,255,255,0.6);margin:15px auto;}
        .content{font-size:1.5em;line-height:1.7;background:rgba(255,255,255,0.2);backdrop-filter:blur(15px);padding:30px;border-radius:25px;max-height:40vh;overflow:auto;margin:15px 0;}
        .instruction{font-size:1.4em;margin:25px 0;padding:20px;background:rgba(255,255,255,0.25);border-radius:20px;border:2px solid rgba(255,255,255,0.4);}
        .debug{position:fixed;top:15px;left:15px;background:rgba(0,0,0,0.85);color:#00ff88;padding:15px;border-radius:20px;font-family:monospace;font-size:1em;max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
        .btn{background:linear-gradient(45deg,#4facfe,#00f2fe);color:white;border:none;padding:20px 40px;font-size:1.4em;border-radius:50px;cursor:pointer;margin:12px;box-shadow:0 15px 40px rgba(79,172,254,0.4);transition:all .3s;font-weight:600;}
        .btn:hover{transform:translateY(-6px) scale(1.06);box-shadow:0 20px 50px rgba(79,172,254,0.6);}
        #mainScreen{display:none;}
    </style>
</head>
<body class="pdf">
    <div class="debug" id="debug">γ値を確認中...</div>
    <div class="container">
        <div id="startScreen">
            <div class="header">📱 PDF自動切り替え</div>
            <div class="instruction">
                <strong>あなたのiPhone仕様</strong><br>
                ➡️ <strong>右傾け（γ負）= PDF</strong><br>
                ⬅️ <strong>左傾け（γ正）= リスト</strong>
            </div>
            <button class="btn" onclick="startSensor()">🎯 センサー開始</button>
        </div>
        <div id="mainScreen">
            <div class="header" id="title">document.pdf</div>
            <div class="instruction" id="instruction">右傾けでPDF固定</div>
            <iframe id="pdfViewer" class="pdf-viewer" src="document.pdf#zoom=110" frameborder="0"></iframe>
            <div class="content" id="content"></div>
        </div>
    </div>
    <script>
        let sensorActive = false;
        
        async function startSensor() {
            try {
                if (DeviceOrientationEvent?.requestPermission) {
                    await DeviceOrientationEvent.requestPermission();
                }
            } catch(e) {}
            
            sensorActive = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            window.addEventListener('deviceorientation', handleTilt);
            document.body.classList.add('pdf');
            updateContent('pdf');
        }
        
        function handleTilt(e) {
            const gamma = e.gamma || 0;
            updateDebug(`γ:${gamma.toFixed(1)}° | ${gamma>10?'左リスト':gamma<-10?'右PDF':'中央'}`);
            
            // あなたのiPhone仕様に最適化
            if (gamma > 10) {  // 左傾き（+）
                if (!document.body.classList.contains('list')) {
                    document.body.classList.remove('pdf');
                    document.body.classList.add('list');
                    updateContent('list');
                }
            } else if (gamma < -10) {  // 右傾き（-）
                if (!document.body.classList.contains('pdf')) {
                    document.body.classList.remove('list');
                    document.body.classList.add('pdf');
                    updateContent('pdf');
                }
            }
        }
        
        function updateContent(mode) {
            const isPdf = mode === 'pdf';
            document.getElementById('title').textContent = isPdf ? '📄 document.pdf' : '✅ チェックリスト';
            document.getElementById('instruction').innerHTML = isPdf ? 
                '⬅️左傾け（γ+）でリストへ' : '➡️右傾け（γ-）でPDFへ';
            document.getElementById('pdfViewer').style.display = isPdf ? 'block' : 'none';
            
            document.getElementById('content').innerHTML = isPdf ? `
                <strong>🎯 PDF営業資料（自動）</strong><br>
                • GitHub HTTPS直読み込み<br>
                • 自動ズーム調整<br>
                • ピンチ操作対応<br><br>
                <strong>📱 動作確認</strong><br>
                γ${gamma>0?'>10左':'<-10右'}で切り替え
            ` : `
                <strong>契約チェックリスト</strong><br><br>
                ✅ 見積書発行<br>
                ✅ 仕様確認<br>
                ⚠️ 部長承認 <em>(進行中)</em><br>
                ⏳ 決裁印<br>
                ⏳ 支払条件<br><br>
                <div style="margin-top:20px;font-size:1.1em;">
                    <strong>⏰ 締切：4/28</strong>
                </div>
            `;
        }
        
        function updateDebug(text) {
            document.getElementById('debug').textContent = text;
        }
    </script>
</body>
</html>
