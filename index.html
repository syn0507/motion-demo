<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 体向き3分割（安定版）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;background:#000;color:white;text-align:center;transition:background .4s;}
        
        /* 背景色 */
        body.pdf{background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);} /* 左：PDF(暖色系) */
        body.list{background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);} /* 右：リスト(寒色系) */
        body.center{background:#000;} /* 真ん中：真っ暗 */

        .container{max-width:95vw;padding:20px;height:100vh;display:flex;flex-direction:column;justify-content:center;}
        .header{font-size:3.0em;font-weight:900;margin-bottom:10px;}
        
        .pdf-viewer{width:95%;height:60vh;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.2);margin:0 auto;}
        .content{font-size:1.8em;line-height:1.6;background:rgba(255,255,255,0.15);backdrop-filter:blur(15px);padding:30px;border-radius:25px;margin:0 auto;width:90%;}
        
        .debug{position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#0f0;padding:8px 15px;border-radius:10px;font-family:monospace;font-size:0.8em;z-index:100;}
        
        .btn-large{background:#007aff;color:white;border:none;padding:20px 40px;font-size:1.5em;border-radius:50px;font-weight:bold;}
        .btn-reset{background:none;border:1px solid #555;color:#888;padding:10px 20px;border-radius:20px;margin-top:30vh;}

        #mainScreen, #pdfFrame, #listContent { display: none; }
    </style>
</head>
<body class="center">
    <div class="debug" id="debug">Ready</div>
    
    <div class="container">
        <div id="startScreen">
            <h1 style="margin-bottom:30px;">Sensor Interface</h1>
            <button class="btn-large" onclick="start3way()">START</button>
        </div>
        
        <div id="mainScreen">
            <h2 class="header" id="title"></h2>
            
            <iframe id="pdfFrame" class="pdf-viewer" src="document.pdf#toolbar=0" frameborder="0"></iframe>
            
            <div id="listContent" class="content"></div>

            <div id="centerContent">
                <button class="btn-reset" onclick="location.reload()">Reset Calibration</button>
            </div>
        </div>
    </div>

    <script>
        let baseAlpha = 0;
        let currentMode = 'center';
        
        async function start3way() {
            try {
                if (DeviceOrientationEvent?.requestPermission) {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res !== 'granted') return;
                }
            } catch(e) {}
            
            // 最初の向きを取得
            const initHandler = e => {
                baseAlpha = e.alpha || 0;
                window.removeEventListener('deviceorientation', initHandler);
                window.addEventListener('deviceorientation', handle3wayTurn);
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                update3way('center');
            };
            window.addEventListener('deviceorientation', initHandler);
        }
        
        function handle3wayTurn(e) {
            const alpha = e.alpha || 0;
            // 0-360の相対角度を計算 (-180 〜 180に変換して扱いやすくする)
            let diff = alpha - baseAlpha;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            updateDebug(`角度: ${Math.round(diff)}°`);
            
            let newMode = 'center';
            
            // 判定しきい値を調整（デッドゾーン：±30度は真ん中）
            if (diff < -40) {
                // 左に40度以上傾いた
                newMode = 'pdf'; 
            } else if (diff > 40) {
                // 右に40度以上傾いた
                newMode = 'list'; 
            } else {
                // 正面付近（-40度 〜 40度）
                newMode = 'center';
            }
            
            if (newMode !== currentMode) {
                currentMode = newMode;
                update3way(newMode);
            }
        }
        
        function update3way(mode) {
            document.body.className = mode;
            const elements = {
                title: document.getElementById('title'),
                pdf: document.getElementById('pdfFrame'),
                list: document.getElementById('listContent'),
                center: document.getElementById('centerContent')
            };

            // 全て隠す
            Object.values(elements).forEach(el => el.style.display = 'none');

            if (mode === 'pdf') {
                elements.title.textContent = '📄 PDF DOCUMENT';
                elements.title.style.display = 'block';
                elements.pdf.style.display = 'block';
            } else if (mode === 'list') {
                elements.title.textContent = '✅ CHECKLIST';
                elements.title.style.display = 'block';
                elements.list.style.display = 'block';
                elements.list.innerHTML = `<h3>Task List</h3><hr><div style="text-align:left; padding:20px;">・見積書発行<br>・仕様確認<br>・承認待ち</div>`;
            } else {
                elements.center.style.display = 'block';
            }
        }
        
        function updateDebug(text) {
            document.getElementById('debug').textContent = text;
        }
    </script>
</body>
</html>
