<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モーションセンサーデモ（iPhone対応）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.3s ease;
        }
        .container {
            max-width: 90vw;
            padding: 20px;
        }
        .status {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .current-screen {
            font-size: 4em;
            background: rgba(255,255,255,0.2);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .content {
            font-size: 1.8em;
            line-height: 1.4;
            margin: 30px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .content.active {
            opacity: 1;
            transform: translateY(0);
        }
        .instruction {
            font-size: 1.2em;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .permission-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            margin: 10px;
        }
        .permission-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .permission-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8em;
            font-family: monospace;
            max-width: 220px;
            line-height: 1.4;
        }
        .manual-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .manual-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .manual-btn:hover, .manual-btn.active {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .error {
            background: rgba(255,107,107,0.3);
            border: 2px solid #ff6b6b;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .device-info {
            font-size: 0.9em;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="debug" id="debug">センサー準備中...</div>
    
    <div class="container">
        <div class="status" id="status">センサー許可をお願いします</div>
        
        <div id="permissionScreen">
            <div class="instruction" id="instruction">
                📱 スマホを左右に振って画面を切り替え
            </div>
            <div style="margin: 20px 0;">
                <button class="permission-btn" id="motionBtn" onclick="requestMotionPermission()">
                    🚀 モーション許可
                </button>
                <br>
                <button class="permission-btn" id="orientationBtn" onclick="requestOrientationPermission()" style="background: linear-gradient(45deg, #4ecdc4, #44a08d);">
                    🔄 傾き許可（推奨）
                </button>
            </div>
            <p class="device-info" id="deviceInfo"></p>
            <div class="manual-controls">
                <button class="manual-btn" onclick="switchTo('資料')">📄 資料</button>
                <button class="manual-btn" onclick="switchTo('チェックリスト')">✅ チェックリスト</button>
            </div>
        </div>

        <div id="mainScreen" style="display: none;">
            <div class="instruction">
                ➡️ 右に振る：資料　　⬅️ 左に振る：チェックリスト
            </div>
            <div class="current-screen" id="currentScreen">資料</div>
            <div class="content" id="content"></div>
        </div>

        <div id="errorScreen" class="error" style="display: none;">
            <h2>❌ センサー非対応</h2>
            <p>下のボタンで手動切り替えができます</p>
            <div class="manual-controls">
                <button class="manual-btn" onclick="switchTo('資料')">📄 資料</button>
                <button class="manual-btn" onclick="switchTo('チェックリスト')">✅ チェックリスト</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 定数・設定 =====
        const THRESHOLD_MOTION = 18;      // DeviceMotion用しきい値（iPhone調整済）
        const THRESHOLD_ORIENTATION = 25; // DeviceOrientation用（度/秒）
        const COOLDOWN_MS = 800;          // クールダウン時間
        const REQUIRED_SWIPES = 2;        // 連続判定回数
        
        let currentScreen = '資料';
        let isCooldown = false;
        let swipeCounts = { left: 0, right: 0 };
        let lastMotionTime = 0;
        let motionPermission = false;
        let orientationPermission = false;
        let isIPhone = /iPad|iPhone|iPod/.test(navigator.userAgent);

        // ===== 権限リクエスト（iPhone対応）=====
        async function requestMotionPermission() {
            const btn = document.getElementById('motionBtn');
            btn.disabled = true;
            btn.textContent = '許可確認中...';
            
            try {
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    // iOS 13+ Safari
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        motionPermission = true;
                        updateDebug('✅ DeviceMotion許可取得');
                        startSensors();
                    } else {
                        updateDebug('❌ DeviceMotion許可拒否');
                    }
                } else {
                    // Androidなど自動許可
                    motionPermission = true;
                    startSensors();
                }
            } catch (e) {
                console.error('Motion permission error:', e);
                motionPermission = true; // HTTPSなら許可不要
                startSensors();
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 モーション許可';
            }
        }

        async function requestOrientationPermission() {
            const btn = document.getElementById('orientationBtn');
            btn.disabled = true;
            btn.textContent = '許可確認中...';
            
            try {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        orientationPermission = true;
                        updateDebug('✅ DeviceOrientation許可取得');
                        startSensors();
                    } else {
                        updateDebug('❌ DeviceOrientation許可拒否');
                    }
                }
            } catch (e) {
                console.error('Orientation permission error:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 傾き許可（推奨）';
            }
        }

        // ===== センサー開始 =====
        function startSensors() {
            if (motionPermission) {
                window.addEventListener('devicemotion', handleMotion);
            }
            if (orientationPermission) {
                window.addEventListener('deviceorientation', handleOrientation);
            }
            
            document.getElementById('permissionScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            switchTo(currentScreen);
        }

        // ===== DeviceMotion処理（Android/iPhone共通）=====
        function handleMotion(event) {
            const now = Date.now();
            if (isCooldown && now - lastMotionTime < COOLDOWN_MS) return;

            const accel = event.accelerationIncludingGravity;
            if (!accel) return;

            const xAccel = accel.x || 0;
            updateDebug(`Motion X: ${xAccel.toFixed(1)}`);

            detectSwipe(xAccel, 'Motion');
        }

        // ===== DeviceOrientation処理（iPhone最適化）=====
        function handleOrientation(event) {
            const now = Date.now();
            if (isCooldown && now - lastMotionTime < COOLDOWN_MS) return;

            // gamma: 左右回転（-90〜90度、iPhone横持ちで左右振り検出最適）
            const gamma = event.gamma || 0;
            updateDebug(`Orientation γ: ${gamma.toFixed(1)}°`);

            detectSwipe(gamma, 'Orientation');
        }

        // ===== 共通スワイプ判定 =====
        function detectSwipe(value, source) {
            if (Math.abs(value) > (source === 'Motion' ? THRESHOLD_MOTION : THRESHOLD_ORIENTATION)) {
                if (value > 0) { // 右
                    swipeCounts.right++;
                    swipeCounts.left = 0;
                    if (swipeCounts.right >= REQUIRED_SWIPES) {
                        switchTo('資料');
                    }
                } else { // 左
                    swipeCounts.left++;
                    swipeCounts.right = 0;
                    if (swipeCounts.left >= REQUIRED_SWIPES) {
                        switchTo('チェックリスト');
                    }
                }
                
                isCooldown = true;
                lastMotionTime = Date.now();
                setTimeout(() => { isCooldown = false; }, COOLDOWN_MS);
            }
        }

        // ===== 画面切り替え（変更なし）=====
        function switchTo(screen) {
            if (currentScreen === screen) return;
            
            currentScreen = screen;
            document.getElementById('currentScreen').textContent = screen;
            document.getElementById('content').innerHTML = getContent(screen);
            document.querySelector('.content').classList.add('active');
            
            swipeCounts = { left: 0, right: 0 };
            isCooldown = false;
            updateDebug(`${screen} (${isIPhone ? 'iPhone' : 'Android'})`);
        }

        function getContent(screen) {
            if (screen === '資料') {
                return `
                    📊 <strong>営業資料</strong><br>
                    ・売上推移グラフ<br>
                    ・競合比較表<br>
                    ・新機能紹介<br><br>
                    💡 右に振ると再表示
                `;
            } else {
                return `
                    ✅ <strong>チェックリスト</strong><br>
                    ・契約書確認 ☐<br>
                    ・決裁印押印 ☐<br>
                    ・納品日調整 ☐<br>
                    ・請求書発行 ☐<br><br>
                    💡 左に振ると再表示
                `;
            }
        }

        function updateDebug(text) {
            document.getElementById('debug').textContent = text;
        }

        // ===== 初期化 =====
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('deviceInfo').textContent = 
                isIPhone ? 'iPhone検出：傾き許可ボタン推奨' : 'Android：モーション許可でOK';
            
            if (!window.DeviceMotionEvent && !window.DeviceOrientationEvent) {
                document.getElementById('permissionScreen').style.display = 'none';
                document.getElementById('errorScreen').style.display = 'block';
            }
        });
    </script>
</body>
</html>
