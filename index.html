<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 診断モード</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .debug { background: #fff; border: 2px solid #ff6b6b; padding: 20px; margin: 20px 0; border-radius: 10px; font-family: monospace; }
        .status { font-size: 2em; padding: 20px; background: #4ecdc4; color: white; border-radius: 15px; margin: 20px 0; }
        button { background: #ff6b6b; color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 25px; cursor: pointer; margin: 10px; }
        button:hover { background: #ff5252; transform: scale(1.05); }
        .gamma { font-size: 3em; font-weight: bold; color: #2196f3; margin: 20px 0; }
        .log { height: 300px; overflow: auto; background: white; border: 1px solid #ddd; padding: 15px; border-radius: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🔍 センサー診断ツール</h1>
    
    <div class="status" id="status">準備中...</div>
    
    <button onclick="startTest()">🚀 センサー診断開始</button>
    <button onclick="resetPermission()">🔄 権限リセット</button>
    
    <div class="gamma" id="gammaDisplay">γ: --°</div>
    
    <div class="debug">
        <strong>環境情報</strong><br>
        <div id="envInfo">読み込み中...</div>
    </div>
    
    <div class="log" id="log"></div>

    <script>
        let orientationHandler;
        
        function log(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }
        
        async function startTest() {
            log('=== 診断開始 ===');
            
            // 環境確認
            const ua = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/.test(ua);
            document.getElementById('envInfo').innerHTML = `
                UserAgent: ${ua.substring(0,50)}...<br>
                iOS: ${isIOS}<br>
                Permission API: ${!!DeviceOrientationEvent?.requestPermission}
            `;
            
            // 権限リクエスト
            try {
                if (DeviceOrientationEvent?.requestPermission) {
                    log('iOS検出：権限リクエスト実行');
                    const permission = await DeviceOrientationEvent.requestPermission();
                    log(`権限結果：${permission}`);
                    if (permission !== 'granted') {
                        document.getElementById('status').innerHTML = '❌ 権限拒否されました';
                        return;
                    }
                } else {
                    log('Android/PC：自動許可');
                }
            } catch(e) {
                log(`権限エラー：${e.message}`);
            }
            
            // センサー監視開始
            document.getElementById('status').innerHTML = '✅ 監視中！右左に傾けてください';
            orientationHandler = (e) => {
                const gamma = e.gamma?.toFixed(1) || 'N/A';
                document.getElementById('gammaDisplay').textContent = `γ: ${gamma}°`;
                log(`gamma=${gamma} alpha=${e.alpha?.toFixed(1)||'N/A'} beta=${e.beta?.toFixed(1)||'N/A'}`);
                
                // 判定テスト
                if (gamma > 20) log('🎉 右検知！');
                if (gamma < -20) log('🎉 左検知！');
            };
            
            window.addEventListener('deviceorientation', orientationHandler);
            log('✅ deviceorientationリスナー登録完了');
        }
        
        function resetPermission() {
            log('権限リセット：Safari設定→モーション&方向→許可 に変更してください');
            window.removeEventListener('deviceorientation', orientationHandler);
            document.getElementById('gammaDisplay').textContent = 'γ: --°';
            document.getElementById('log').innerHTML = '';
            document.getElementById('status').innerHTML = '準備中...';
        }
        
        // ページ読み込み時診断
        window.addEventListener('DOMContentLoaded', () => {
            log('ページ読み込み完了');
            log(`URL: ${window.location.href}`);
            log(`HTTPS: ${window.location.protocol === 'https:'}`);
        });
    </script>
</body>
</html>
