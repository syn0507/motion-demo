<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👤 体向き3分割（反転・暗黒版）</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;background:#000;color:white;text-align:center;transition:all .6s ease;}
        /* 背景色設定 */
        body.pdf{background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);} /* 左：PDF */
        body.list{background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);} /* 右：リスト */
        body.center{background:#000;} /* 真ん中：真っ暗 */

        .container{max-width:95vw;padding:20px;height:100vh;display:flex;flex-direction:column;justify-content:center;}
        .header{font-size:3.5em;font-weight:900;margin:20px 0;background:linear-gradient(45deg,#ffd700,#ffed4e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .pdf-viewer{width:92%;height:450px;border-radius:30px;box-shadow:0 30px 80px rgba(0,0,0,0.5);border:5px solid rgba(255,255,255,0.4);margin:20px auto;}
        .content{font-size:1.6em;line-height:1.7;background:rgba(255,255,255,0.2);backdrop-filter:blur(20px);padding:35px;border-radius:30px;max-height:40vh;overflow:auto;margin:20px 0;}
        
        .debug{position:fixed;top:20px;left:20px;background:rgba(0,0,0,0.9);color:#00ff88;padding:15px;border-radius:15px;font-family:monospace;font-size:0.9em;z-index:100;}
        
        .btn-large{background:linear-gradient(45deg,#4facfe,#00f2fe);color:white;border:none;padding:25px 50px;font-size:1.6em;border-radius:60px;cursor:pointer;margin:20px;font-weight:700;box-shadow:0 15px 40px rgba(79,172,254,0.4);}
        .btn-reset{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.3);padding:15px 30px;font-size:1.2em;border-radius:40px;cursor:pointer;margin-top:50px;}

        #mainScreen,#pdfFrame,#listContent{display:none;}
        
        .compass{margin:25px;}
        .compass-circle{width:70px;height:70px;border:3px solid rgba(255,255,255,0.5);border-radius:50%;position:relative;display:inline-block;}
        .needle{width:4px;height:25px;background:#ff4444;position:absolute;top:10px;left:33px;transform-origin:bottom center;transition:transform .4s;}
    </style>
</head>
<body class="center">
    <div class="debug" id="debug">胸固定 → 左右回転</div>
    
    <div class="container">
        <div id="startScreen">
            <div class="header">DEMO START</div>
            <button class="btn-large" onclick="start3way()">🎯 3分割開始</button>
        </div>
        
        <div id="mainScreen">
            <div id="uiElements">
                <div class="header" id="title"></div>
                <iframe id="pdfFrame" class="pdf-viewer" src="document.pdf#zoom=115" frameborder="0"></iframe>
                <div class="content" id="listContent"></div>
            </div>

            <div id="centerContent">
                <button class="btn-reset" onclick="location.reload()">🔄 方位をリセットする</button>
            </div>
        </div>
    </div>

    <script>
        let baseAlpha = 0, currentMode = 'center';
        
        async function start3way() {
            try {
                if (DeviceOrientationEvent?.requestPermission) await DeviceOrientationEvent.requestPermission();
            } catch(e) {}
            
            const handler = e => {
                baseAlpha = e.alpha || 0;
                window.removeEventListener('deviceorientation', handler);
                window.addEventListener('deviceorientation', handle3wayTurn);
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('mainScreen').style.display = 'block';
                update3way('center');
            };
            window.addEventListener('deviceorientation', handler);
        }
        
        function handle3wayTurn(e) {
            const alpha = e.alpha || 0;
            const relative = (alpha - baseAlpha + 360) % 360;
            
            updateDebug(`方位:${relative.toFixed(0)}°`);
            
            let newMode;
            // 判定ロジックの修正
            if (relative > 315 || relative < 45) {
                newMode = 'center';   // 正面
            } else if (relative > 45 && relative < 135) {
                newMode = 'list';     // 右（東） = リスト
            } else if (relative > 225 && relative < 315) {
                newMode = 'pdf';      // 左（西） = PDF
            } else {
                newMode = 'center';   // 後ろ（今回はcenter扱い）
            }
            
            if (newMode !== currentMode) {
                currentMode = newMode;
                update3way(newMode);
            }
        }
        
        function update3way(mode) {
            document.body.className = mode;
            
            const titleEl = document.getElementById('title');
            const pdfEl = document.getElementById('pdfFrame');
            const listEl = document.getElementById('listContent');
            const centerEl = document.getElementById('centerContent');

            // 一旦すべて非表示
            [pdfEl, listEl, centerEl, titleEl].forEach(el => el.style.display = 'none');

            if (mode === 'pdf') {
                titleEl.textContent = '📄 PDF資料（左）';
                titleEl.style.display = 'block';
                pdfEl.style.display = 'block';
            } else if (mode === 'list') {
                titleEl.textContent = '✅ チェックリスト（右）';
                titleEl.style.display = 'block';
                listEl.style.display = 'block';
                listEl.innerHTML = `
                    <h3>契約チェックリスト</h3>
                    <div style="text-align:left;font-size:1.1em;margin-top:15px;">
                        ✅ 見積書発行<br>
                        ✅ 仕様確認<br>
                        ⚠️ 部長承認（申請中）<br>
                        ⏳ 決裁印
                    </div>
                `;
            } else {
                // 真ん中の時はリセットボタンのみ
                centerEl.style.display = 'block';
            }
        }
        
        function updateDebug(text) {
            document.getElementById('debug').textContent = text;
        }
    </script>
</body>
</html>
